name: Deploy PokéGang to OVH

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pokegang-ovh
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site to OVH via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add deployment marker
        run: |
          echo "PokéGang deploy" > deploy-test.txt
          echo "Commit: $GITHUB_SHA" >> deploy-test.txt
          echo "Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> deploy-test.txt

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/ovh_key
          chmod 600 ~/.ssh/ovh_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote target directory exists
        run: |
          ssh -i ~/.ssh/ovh_key "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" "mkdir -p ~/pokegang"

      - name: Deploy to OVH with rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='docs/' \
            -e "ssh -i ~/.ssh/ovh_key" \
            ./ "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/pokegang/"
