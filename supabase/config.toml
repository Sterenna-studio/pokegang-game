# Supabase project config — PokéGang
# https://supabase.com/docs/guides/cli/config
#
# Deploy les Edge Functions :
#   supabase login
#   supabase link --project-ref YOUR_PROJECT_REF
#   supabase functions deploy pokegang-api
#   supabase functions deploy pokegang-leaderboard-submit
#
# ⚠ Ordre de rollout pour le durcissement leaderboard :
#   1) déployer pokegang-leaderboard-submit
#   2) PUIS rejouer docs/supabase-schema.sql (qui révoque l'écriture directe)
#   Inverser l'ordre = les écritures leaderboard échouent (silencieusement) le
#   temps que la fonction soit en ligne.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "https://pokegang.sterenna.fr"
additional_redirect_urls = ["https://pokegang.sterenna.fr"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.pokegang-api]
# Accès public — pas besoin de JWT
verify_jwt = false

[functions.pokegang-leaderboard-submit]
# Les joueurs anonymes (sans compte) doivent pouvoir soumettre leur score :
# on n'exige donc pas de JWT au niveau de la plateforme. La fonction vérifie
# elle-même l'access token quand il est présent (pour lier user_id), et assainit
# tout le payload côté serveur. L'écriture directe sur la table est révoquée (RLS).
verify_jwt = false
